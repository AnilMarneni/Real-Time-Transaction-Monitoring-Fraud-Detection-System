version: '3.8'

services:
  # Infrastructure Services
  postgres:
    image: postgres:15
    container_name: fraud_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fraud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - fraud_network

  redis:
    image: redis:7
    container_name: fraud_redis_prod
    restart: always
    ports:
      - "6379:6379"
    networks:
      - fraud_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud_zookeeper_prod
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - fraud_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud_kafka_prod
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - fraud_network

  # Application Services
  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: fraud_ml_service_prod
    restart: always
    environment:
      - PYTHONPATH=/app
      - MODEL_PATH=/app/models
    volumes:
      - ./apps/ml-service/models:/app/models
    ports:
      - "8000:8000"
    networks:
      - fraud_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ./apps/api-server
      dockerfile: Dockerfile
    container_name: fraud_api_server_prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-fraud_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - KAFKA_BROKERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - ML_SERVICE_URL=http://ml-service:8000
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - ./apps/api-server/logs:/app/logs
      - ./apps/api-server/uploads:/app/uploads
    ports:
      - "4000:4000"
    networks:
      - fraud_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: fraud_frontend_prod
    restart: always
    environment:
      - VITE_API_URL=http://localhost:4000
    ports:
      - "80:80"
      - "443:443"
    networks:
      - fraud_network
    depends_on:
      api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Monitoring & Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: fraud_prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fraud_network

  grafana:
    image: grafana/grafana:latest
    container_name: fraud_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - fraud_network
    depends_on:
      - prometheus

  # Backup Service
  backup:
    image: postgres:15-alpine
    container_name: fraud_backup
    restart: always
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD:-admin}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh
    networks:
      - fraud_network
    depends_on:
      - postgres
    entrypoint: /bin/sh
    command: |
      -c "
      while true; do
        echo 'Running backup...'
        /backup.sh
        echo 'Backup completed. Sleeping for 24 hours...'
        sleep 86400
      done
      "

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  fraud-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
