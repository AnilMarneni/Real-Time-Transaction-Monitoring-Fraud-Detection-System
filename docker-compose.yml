version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fraud_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: fraud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - fraud_network

  redis:
    image: redis:7
    container_name: fraud_redis_dev
    restart: always
    ports:
      - "6379:6379"
    networks:
      - fraud_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud_zookeeper_dev
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - fraud_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud_kafka_dev
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fraud_network

  api-server:
    build: ./apps/api-server
    container_name: fraud_api_dev
    restart: always
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/fraud_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: dev-jwt-secret-key-change-in-production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - kafka
    volumes:
      - ./apps/api-server:/app
      - /app/node_modules
    networks:
      - fraud_network

  frontend:
    build: ./apps/frontend
    container_name: fraud_frontend_dev
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - api-server
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    networks:
      - fraud_network

  ml-service:
    build: ./apps/ml-service
    container_name: fraud_ml_dev
    restart: always
    ports:
      - "8000:8000"
    networks:
      - fraud_network

volumes:
  postgres_data_dev:

networks:
  fraud_network:
    driver: bridge
